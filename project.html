    <style>
        /* Visual framework - right under the button */
        .visual-framework {
            position: relative;
            width: 800px;
            height: 380px;
            margin: 12px auto 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .rings {
            position: relative;
            width: 620px;
            height: 260px;
        }

        .ring {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(100, 180, 255, 0.25);
            border-radius: 50%;
            box-shadow: 
                0 0 40px rgba(100, 180, 255, 0.6),
                inset 0 0 40px rgba(100, 180, 255, 0.2);
        }

        .ring1 { 
            width: 520px; 
            height: 180px; 
            animation: rotateOuter 45s linear infinite;
        }
        .ring2 { 
            width: 420px; 
            height: 140px; 
            animation: rotateInner 35s linear infinite reverse;
        }

        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(150, 200, 255, 0.9) 1px, transparent 1px);
            background-size: 12px 12px;
            box-shadow: 0 0 30px rgba(150, 200, 255, 0.8);
            animation: pulse 8s infinite linear;
        }

        .line {
            position: absolute;
            width: 2px;
            background: linear-gradient(transparent, #88ccff, transparent);
            box-shadow: 0 0 15px #88ccff;
            opacity: 0.75;
            animation: floatLine 12s ease-in-out infinite;
        }

        .line:nth-child(1)  { left: 12%; top: 80px; height: 220px; animation-delay: 0s; }
        .line:nth-child(2)  { left: 22%; top: 60px; height: 180px; animation-delay: 1.2s; }
        .line:nth-child(3)  { left: 32%; top: 90px; height: 160px; animation-delay: 3.4s; }
        .line:nth-child(4)  { left: 45%; top: 50px; height: 210px; animation-delay: 2.1s; }
        .line:nth-child(5)  { left: 55%; top: 70px; height: 170px; animation-delay: 4.8s; }
        .line:nth-child(6)  { left: 68%; top: 45px; height: 200px; animation-delay: 0.7s; }
        .line:nth-child(7)  { left: 78%; top: 85px; height: 150px; animation-delay: 5.5s; }
        .line:nth-child(8)  { left: 88%; top: 65px; height: 190px; animation-delay: 2.9s; }

        @keyframes rotateOuter {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateInner {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @keyframes floatLine {
            0%, 100% { transform: translateY(0px); opacity: 0.75; }
            50% { transform: translateY(-12px); opacity: 0.95; }
        }

        /* Tight spacing - right under the button */
        .header__container { padding-bottom: 0; }
        .inner__elems { margin-bottom: 8px; }
        .info__buttons { margin-bottom: 10px; }
    </style>
</head>
